name: Desplegar frontend en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      # VITE_API_URL se toma de la variable del repositorio (Settings → Secrets
      # and variables → Actions → Variables). Debe apuntar a un backend público
      # (ej. https://xxxx.ngrok-free.app/api). Sin ella, la página carga pero
      # el login no funcionará hasta configurar el backend.
      - name: Compilar frontend
        working-directory: frontend
        run: npm run build -- --base=/MediSaludSGI2026/
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Fallback SPA para rutas profundas
        run: cp frontend/dist/index.html frontend/dist/404.html

      # Requiere haber activado Pages una vez: Settings → Pages → Source: GitHub Actions
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
