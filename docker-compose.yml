services:
  db:
    image: postgres:16-alpine
    container_name: grm_db
    environment:
      POSTGRES_DB: grm_medisalud
      POSTGRES_USER: grm_user
      POSTGRES_PASSWORD: grm_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grm_user -d grm_medisalud"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: grm_backend
    command: /app/entrypoint.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-medisalud-2026
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_ENGINE: postgres
      DB_NAME: grm_medisalud
      DB_USER: grm_user
      DB_PASSWORD: grm_pass
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: grm_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # El navegador llama /api (mismo origen) y Vite lo reenvía al backend del compose
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
